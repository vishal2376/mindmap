<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' https://unpkg.com; style-src 'unsafe-inline'; img-src data:;">
<title>Mindmap</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
:root{
  --bg:#1e1e2e;--bg-s:#181825;--sf:#2a2b3d;--sf2:#333448;--sf3:#3c3d52;
  --bd:#3e3f58;--bd2:#4e4f6a;--tx:#cdd6f4;--tx2:#b4befe;--tx3:#a6adc8;--tx4:#7f849c;--tx5:#585b70;
  --root:#f5c2e7;--child:#89b4fa;--parent:#a6e3a1;--lib:#6c7086;
  --accent:#89b4fa;--warn:#f9e2af;--err:#f38ba8;
  --d0:#f5c2e7;--d1:#cba6f7;--d2:#89b4fa;--d3:#94e2d5;--d4:#a6e3a1;--d5:#f9e2af;--d6:#fab387;--d7:#f38ba8;
  --r:6px;--ease:cubic-bezier(.22,1,.36,1)
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font:11px/1.4 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* ── TOOLBAR ── */
#toolbar{height:38px;background:var(--bg-s);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 6px;gap:3px;z-index:100;user-select:none;backdrop-filter:blur(12px)}
.vsw{display:flex;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;flex-shrink:0}
.vb{padding:3px 10px;font:500 10px/1 inherit;color:var(--tx4);background:0;border:0;cursor:pointer;transition:all .2s var(--ease);display:flex;align-items:center;gap:3px}
.vb:hover{color:var(--tx3);background:var(--sf2)}
.vb.on{color:var(--bg);background:var(--accent);font-weight:600}
.vb svg{width:11px;height:11px}
.sep{width:1px;height:16px;background:var(--bd);margin:0 2px;flex-shrink:0}
.nb{width:24px;height:24px;display:grid;place-items:center;background:0;border:1px solid transparent;border-radius:4px;color:var(--tx4);cursor:pointer;transition:all .15s;flex-shrink:0;position:relative}
.nb:hover:not(:disabled){color:var(--tx);background:var(--sf);border-color:var(--bd)}
.nb:disabled{color:var(--bd);cursor:default;opacity:.35}
.nb svg{width:12px;height:12px}
.hc{font:600 8.5px/1 'JetBrains Mono',monospace;color:var(--tx5);padding:0 1px;white-space:nowrap}
.hc.h{display:none}
#bc{font-size:11px;color:var(--tx3);display:flex;align-items:center;gap:4px;min-width:0;flex:1 1 0;overflow:hidden}
.bci{color:var(--root);font-size:9px;flex-shrink:0}
.bcn{font:600 10.5px/1 'JetBrains Mono','SF Mono','Fira Code',monospace;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Search */
.sb{height:24px;display:flex;align-items:center;border-radius:var(--r);background:0;border:1px solid transparent;cursor:pointer;transition:all .25s var(--ease);flex-shrink:0;overflow:hidden;padding:0 6px;gap:4px;color:var(--tx4)}
.sb:hover{background:var(--sf);border-color:var(--bd);color:var(--tx)}
.sb.op{width:180px;background:var(--sf);border-color:var(--bd)}
.sb svg{width:12px;height:12px;flex-shrink:0}
.sb input{background:0;border:0;outline:0;color:var(--tx);font:inherit;width:0;transition:width .25s var(--ease);padding:0}
.sb.op input{width:130px}
.sb input::placeholder{color:var(--tx5)}

.tb{width:24px;height:24px;display:grid;place-items:center;background:0;border:1px solid transparent;border-radius:4px;color:var(--tx4);cursor:pointer;transition:all .15s;flex-shrink:0}
.tb:hover{color:var(--tx);background:var(--sf);border-color:var(--bd)}
.tb.on{color:var(--accent);background:rgba(137,180,250,.08);border-color:rgba(137,180,250,.2)}
.tb svg{width:12px;height:12px}

/* Tooltip */
.tt{position:fixed;z-index:9999;pointer-events:none;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);padding:3px 7px;font:10px/1.3 inherit;color:var(--tx3);white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3);opacity:0;transition:opacity .1s}
.tt.s{opacity:1}
.tt kbd{font:9px inherit;background:var(--bg);padding:0 3px;border-radius:2px;border:1px solid var(--bd);color:var(--tx5);margin-left:3px}

/* Toast */
#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--sf);border:1px solid var(--bd2);border-radius:8px;padding:6px 14px;font:500 10px/1 inherit;color:var(--tx);box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:3000;opacity:0;transition:all .2s var(--ease);pointer-events:none;display:flex;align-items:center;gap:6px}
#toast.s{opacity:1;transform:translateX(-50%) translateY(0)}
.td{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── MAIN ── */
#main{flex:1;position:relative;overflow:hidden}
#gc{width:100%;height:100%;transition:opacity .2s}
#gc.off{opacity:0;pointer-events:none;position:absolute}
#tc{width:100%;height:100%;overflow-y:auto;display:none;background:var(--bg)}
#tc.on{display:block}

/* ── TREE ── */
.thb{padding:8px 16px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd);background:var(--bg-s);position:sticky;top:0;z-index:10}
.thb-d{width:7px;height:7px;border-radius:50%}
.thb-t{font:600 10.5px/1 inherit;color:var(--tx);letter-spacing:.2px}
.thb-c{font:10px/1 inherit;color:var(--tx4);margin-left:auto}
.tg{padding:0}
.tgl{padding:3px 16px;font:700 8px/1 inherit;text-transform:uppercase;letter-spacing:.8px;color:var(--tx5);display:flex;align-items:center;gap:5px}
.tgl-d{width:4px;height:4px;border-radius:50%}
.tgl-c{margin-left:auto;font-weight:500;color:var(--bd2);font-size:8px}
.tsl{padding:2px 0;font:600 8.5px/1 inherit;letter-spacing:.2px;color:var(--tx5);display:flex;align-items:center;gap:4px;opacity:.7;position:relative}
.tsl-d{width:3px;height:3px;border-radius:50%}
.tsl-c{margin-left:auto;color:var(--bd2);font-size:8px}

.tr{display:flex;align-items:center;height:30px;padding:0 16px 0 0;cursor:pointer;transition:background .1s;position:relative}
.tr:hover{background:rgba(205,214,244,.03)}
.tr.sel{background:rgba(137,180,250,.06)}
.tr.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent)}
.tr.rt{background:rgba(245,194,231,.025)}
.tr.rt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--root)}
.tri{flex-shrink:0;position:relative}
.tgi{position:absolute;top:0;bottom:0;width:1px;background:var(--bd)}
.tgi-l{position:absolute;top:0;height:50%;width:1px;background:var(--bd)}
.tgh{position:absolute;top:50%;height:1px;background:var(--bd)}
.trc{width:14px;height:30px;display:grid;place-items:center;flex-shrink:0;color:var(--bd2);font-size:7px;transition:transform .12s}
.trc.e{transform:rotate(90deg);color:var(--tx4)}
.trc.l{color:transparent}
.trb{width:2px;height:14px;border-radius:1px;margin:0 8px 0 3px;flex-shrink:0}
.trl{width:20px;height:20px;border-radius:4px;display:grid;place-items:center;font:700 9px/1 inherit;color:var(--bg);margin-right:8px;flex-shrink:0}
.trn{font:500 11px/1 'JetBrains Mono','SF Mono',monospace;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.trf{font:10px/1 inherit;color:var(--tx5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;margin-left:6px}
.trr{display:flex;align-items:center;gap:5px;flex-shrink:0;margin-left:auto;padding-left:10px}
.trg{font:700 7.5px/1 inherit;padding:2px 4px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase}
.bg-r{background:rgba(245,194,231,.1);color:var(--root)}
.bg-o{background:rgba(137,180,250,.1);color:var(--child)}
.bg-i{background:rgba(166,227,161,.1);color:var(--parent)}
.bg-l{background:rgba(108,112,134,.12);color:var(--lib)}
.trloc{font:9px/1 'JetBrains Mono',monospace;color:var(--tx5);min-width:28px;text-align:right}

/* ── TOOLTIP ── */
#ntip{position:fixed;z-index:2000;pointer-events:none;background:var(--bg-s);border:1px solid var(--bd2);border-radius:8px;box-shadow:0 8px 28px rgba(0,0,0,.4);opacity:0;transform:translateY(8px) scale(.98);transition:opacity .35s cubic-bezier(.16,1,.3,1),transform .35s cubic-bezier(.16,1,.3,1);min-width:180px;max-width:300px;overflow:hidden}
#ntip.v{opacity:1;transform:translateY(0) scale(1)}
.th{padding:8px 10px 6px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bd)}
.thi{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;font:700 10px/1 inherit;color:var(--bg);flex-shrink:0}
.tht{min-width:0;flex:1}
.thn{font:600 11px/1 'JetBrains Mono',monospace;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thtp{font:9.5px/1 inherit;color:var(--tx4);margin-top:2px}
.tby{padding:6px 10px 8px}
.tsg{font:9.5px/1.3 'JetBrains Mono',monospace;color:var(--tx3);background:var(--sf);padding:4px 6px;border-radius:4px;word-break:break-all;margin-bottom:5px}
.tfl{font:9px/1 'JetBrains Mono',monospace;color:var(--d6);background:rgba(250,179,135,.08);padding:2px 6px;border-radius:4px;border:1px solid rgba(250,179,135,.2);display:inline-flex;align-items:center;gap:3px;margin-top:3px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tfl svg{width:9px;height:9px;flex-shrink:0;color:var(--d6)}
.tst{display:flex;gap:8px}
.tsd{display:flex;align-items:center;gap:2px;font:9.5px/1 inherit;color:var(--tx4)}
.tsd-d{width:4px;height:4px;border-radius:50%}
.tsd b{color:var(--tx3);font-weight:600}
.thi2{margin-top:5px;padding-top:4px;border-top:1px solid var(--bd);font:8.5px/1 inherit;color:var(--tx5);text-align:center}
.thi2 kbd{font:8px inherit;background:var(--sf);padding:0 2px;border-radius:2px;border:1px solid var(--bd);color:var(--tx4)}

/* ── LEGEND ── */
#leg{position:absolute;top:8px;right:8px;background:rgba(24,24,37,.9);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;z-index:50;font-size:10.5px;min-width:90px}
#leg.h{display:none}
.lt{font:600 9px/1 inherit;text-transform:uppercase;letter-spacing:.5px;color:var(--tx5);margin-bottom:5px}
.lr{display:flex;align-items:center;gap:6px;padding:2px 0;color:var(--tx3);font-size:10.5px}
.lc{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.ln{font:10px/1 'JetBrains Mono',monospace;color:var(--tx5);margin-left:auto}

/* ── STATUS ── */
#sb{height:30px;background:var(--bg-s);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:10px;font:10px/1 inherit;color:var(--tx5);user-select:none}
.si{display:flex;align-items:center;gap:2px}
.sd{width:4px;height:4px;border-radius:50%}
.ss{color:var(--bd)}
.sh{margin-left:auto;display:flex;gap:4px}
.sk{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:var(--sf);border:1px solid var(--bd);font:9.5px/1 inherit;color:var(--tx4);white-space:nowrap}
.sk svg{width:10px;height:10px;flex-shrink:0;opacity:.7}
.sk kbd{font:700 8.5px/1 'JetBrains Mono',monospace;background:var(--sf2);padding:1px 4px;border-radius:3px;border:1px solid var(--bd2);color:var(--tx3);margin:0 1px}
.sk span{color:var(--tx4)}

/* ── ZOOM CONTROLS ── */
#zc{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:2px;z-index:60;background:rgba(24,24,37,.92);backdrop-filter:blur(10px);border:1px solid var(--bd);border-radius:8px;padding:3px;box-shadow:0 4px 16px rgba(0,0,0,.3)}
#zc.h{display:none}
.zb{width:28px;height:28px;display:grid;place-items:center;background:0;border:1px solid transparent;border-radius:5px;color:var(--tx4);cursor:pointer;transition:all .12s;font:600 14px/1 inherit}
.zb:hover{color:var(--tx);background:var(--sf);border-color:var(--bd)}
.zb:active{background:var(--sf2)}
.zb svg{width:14px;height:14px}
.zs{height:1px;background:var(--bd);margin:1px 3px}
#zlv{font:700 8px/1 'JetBrains Mono',monospace;color:var(--tx5);text-align:center;padding:1px 0;letter-spacing:-.3px}

/* ── EMPTY ── */
#es{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--tx4);display:flex;flex-direction:column;align-items:center;gap:8px}
#es.h{display:none}
.ei{width:40px;height:40px;color:var(--bd2)}
.et{font:600 13px/1 inherit;color:var(--tx3)}
.ed{font:11.5px/1.4 inherit;max-width:240px}
.ek{font:11px/1 inherit;margin-top:2px}
.ek kbd{background:var(--sf);padding:1px 6px;border-radius:4px;border:1px solid var(--bd);color:var(--tx)}

/* Loading */
#ld{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(30,30,46,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:200;transition:opacity .2s}
#ld.h{opacity:0;pointer-events:none}
.lr2{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lt2{font:11px/1 inherit;color:var(--tx3)}

.vis-navigation{display:none!important}
.vis-tooltip{display:none!important}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:0}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--bd2)}
</style>
</head>
<body>

<div id="toolbar">
<div class="vsw">
<button class="vb on" id="bg" data-t="Graph view" data-k="1"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="5.5" width="3.5" height="5" rx=".8"/><rect x="6.25" y="1.5" width="3.5" height="5" rx=".8"/><rect x="6.25" y="9.5" width="3.5" height="5" rx=".8"/><rect x="11.5" y="5.5" width="3.5" height="5" rx=".8"/><line x1="4.5" y1="7" x2="6.25" y2="4"/><line x1="4.5" y1="9" x2="6.25" y2="12"/><line x1="9.75" y1="4" x2="11.5" y2="7"/><line x1="9.75" y1="12" x2="11.5" y2="9"/></svg>Graph</button>
<button class="vb" id="bt" data-t="Tree view" data-k="2"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="3" x2="14" y2="3"/><line x1="6" y1="7" x2="14" y2="7"/><line x1="6" y1="11" x2="14" y2="11"/><line x1="2" y1="3" x2="2" y2="11"/><line x1="2" y1="7" x2="5" y2="7"/><line x1="2" y1="11" x2="5" y2="11"/></svg>Tree</button>
</div>
<div class="sep"></div>
<button class="nb" id="bbk" disabled data-t="Back" data-k="Alt+&#8592;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="9,3 4,8 9,13"/></svg></button>
<span class="hc h" id="hbg"></span>
<button class="nb" id="bfw" disabled data-t="Forward" data-k="Alt+&#8594;"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="7,3 12,8 7,13"/></svg></button>
<div class="sep"></div>
<div id="bc"><span class="bci">&#9679;</span><span class="bcn" id="bcn">No function selected</span></div>
<button class="sb" id="sbn" data-t="Search" data-k="/"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg><input id="sin" placeholder="Filter nodes…"/></button>
<div class="sep"></div>
<button class="tb" id="tlib" data-t="Library code"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="6" rx="1"/><rect x="9" y="2" width="5" height="6" rx="1"/><rect x="2" y="10" width="12" height="4" rx="1"/></svg></button>
<button class="tb" id="bfit" data-t="Fit view" data-k="F"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,6 2,2 6,2"/><polyline points="10,2 14,2 14,6"/><polyline points="14,10 14,14 10,14"/><polyline points="6,14 2,14 2,10"/></svg></button>
</div>

<div id="main">
<div id="ld" class="h"><div class="lr2"></div><span class="lt2">Analyzing…</span></div>
<div id="es">
<svg class="ei" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="14" cy="14" r="6"/><circle cx="34" cy="14" r="6"/><circle cx="24" cy="36" r="6"/><line x1="18" y1="18" x2="21" y2="31"/><line x1="30" y1="18" x2="27" y2="31"/><line x1="19" y1="12" x2="29" y2="12"/></svg>
<div class="et">No call graph generated</div>
<div class="ed">Place cursor on a Kotlin function and use the shortcut</div>
<div class="ek"><kbd>Alt</kbd> + <kbd>G</kbd></div>
</div>
<div id="gc"></div>
<div id="tc"></div>
<div id="leg" class="h"><div class="lt">Legend</div><div id="li"></div></div>
<div id="zc" class="h">
<button class="zb" id="bzi" data-t="Zoom in" data-k="+"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="4" x2="8" y2="12"/><line x1="4" y1="8" x2="12" y2="8"/></svg></button>
<div id="zlv">100%</div>
<button class="zb" id="bzo" data-t="Zoom out" data-k="-"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="8" x2="12" y2="8"/></svg></button>
<div class="zs"></div>
<button class="zb" id="bzf" data-t="Fit all" data-k="F"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="2,6 2,2 6,2"/><polyline points="10,2 14,2 14,6"/><polyline points="14,10 14,14 10,14"/><polyline points="6,14 2,14 2,10"/></svg></button>
<button class="zb" id="bzc" data-t="Center on node" data-k="C"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="4"/><line x1="8" y1="12" x2="8" y2="15"/><line x1="1" y1="8" x2="4" y2="8"/><line x1="12" y1="8" x2="15" y2="8"/></svg></button>
</div>
</div>

<div id="sb">
<div class="si"><div class="sd" style="background:var(--root)"></div><span id="sn">0 nodes</span></div>
<span class="ss">·</span>
<div class="si"><div class="sd" style="background:var(--child)"></div><span id="se">0 edges</span></div>
<span class="ss">·</span>
<div class="si"><span id="sdp">Depth 0</span></div>
<span class="ss">·</span>
<div class="si"><span id="sm">Graph</span></div>
<div class="sh" id="sh"></div>
</div>

<div id="ntip">
<div class="th"><div class="thi" id="ti">F</div><div class="tht"><div class="thn" id="tn"></div><div id="tfl" class="tfl" style="display:none"></div><div class="thtp" id="tp"></div></div></div>
<div class="tby"><div class="tsg" id="tsg"></div><div class="tst" id="tss"></div><div class="thi2"><kbd>Click</kbd> navigate · <kbd>Cmd+Click</kbd> expand · <kbd>Dbl</kbd> trace</div></div>
</div>
<div class="tt" id="ttip"></div>
<div id="toast"><span class="td" id="tdot"></span><span id="ttx"></span></div>

<script>
// ── State ──
let net=null,nds=null,eds=null,D=null;
let tColl=new Set();
let showLib=false,sf='',cv='graph',sel=null,drag=false,sOpen=false;

// ── Cached DOM ──
const $=id=>document.getElementById(id);
const $gc=$('gc'),$tc=$('tc'),$ld=$('ld'),$es=$('es');
const $bg=$('bg'),$bt=$('bt'),$bbk=$('bbk'),$bfw=$('bfw'),$hbg=$('hbg');
const $bcn=$('bcn'),$sbn=$('sbn'),$sin=$('sin');
const $tlib=$('tlib'),$bfit=$('bfit');
const $bzi=$('bzi'),$bzo=$('bzo'),$bzf=$('bzf'),$bzc=$('bzc'),$zlv=$('zlv'),$zc=$('zc');
const $sn=$('sn'),$se=$('se'),$sdp=$('sdp'),$sm=$('sm'),$sh=$('sh');
const $leg=$('leg'),$li=$('li');
const $ntip=$('ntip'),$ti=$('ti'),$tn=$('tn'),$tp=$('tp'),$tsg=$('tsg'),$tfl=$('tfl'),$tss=$('tss');
const $ttip=$('ttip'),$toast=$('toast'),$tdot=$('tdot'),$ttx=$('ttx');

// ── Helpers ──
function gc(t,d,l){return l?'#6c7086':t==='ROOT'?'#f5c2e7':t==='INBOUND'?'#a6e3a1':t==='OUTBOUND'?'#89b4fa':'#cba6f7'}
function tr(s,m){return!s||s.length<=m?s:s.slice(0,m-1)+'…'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── Toast ──
let _tt;
function toast(m,c){$tdot.style.background=c||'var(--accent)';$ttx.textContent=m;$toast.classList.add('s');clearTimeout(_tt);_tt=setTimeout(()=>$toast.classList.remove('s'),1600)}

// ── Button Tips ──
document.querySelectorAll('[data-t]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{const r=el.getBoundingClientRect();$ttip.textContent='';const t=document.createTextNode(el.dataset.t);$ttip.appendChild(t);if(el.dataset.k){const k=document.createElement('kbd');k.textContent=el.dataset.k;$ttip.appendChild(k)}$ttip.style.left=(r.left+r.width/2)+'px';$ttip.style.top=(r.bottom+5)+'px';$ttip.style.transform='translateX(-50%)';$ttip.classList.add('s')});
    el.addEventListener('mouseleave',()=>$ttip.classList.remove('s'));
});

// ── Search ──
let _sf;
$sbn.addEventListener('click',e=>{if(!sOpen){sOpen=true;$sbn.classList.add('op');setTimeout(()=>$sin.focus(),250);e.stopPropagation()}});
$sin.addEventListener('click',e=>e.stopPropagation());
$sin.addEventListener('input',e=>{clearTimeout(_sf);_sf=setTimeout(()=>{sf=e.target.value;filtAll()},80)});
document.addEventListener('click',e=>{if(sOpen&&!$sbn.contains(e.target)){sOpen=false;$sbn.classList.remove('op');sf='';$sin.value='';filtAll()}});

// ── Tooltip ──
function showTip(e,n){
    if(drag)return;
    const c=gc(n.type,n.depth,n.isLibrary);
    const tl=n.type==='ROOT'?'Root':n.type==='OUTBOUND'?'Child (calls)':'Parent (caller)';
    $ti.style.background=c;$ti.textContent=(n.name||'F')[0].toUpperCase();
    $tn.textContent=n.name||'anonymous';
    $tp.textContent=tl+(n.isLibrary?' · Library':'');
    $tsg.textContent=n.signature||n.id||'';
    if(n.fileName){$tfl.innerHTML=`<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="width:9px;height:9px;flex-shrink:0"><path d="M4 2h5l4 4v8a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/><polyline points="9,2 9,6 13,6"/></svg>${esc(n.fileName)}`;$tfl.style.display='inline-flex'}else $tfl.style.display='none';
    let s='';if(n.loc>0)s+=`<div class="tsd"><div class="tsd-d" style="background:var(--warn)"></div><b>${n.loc}</b>loc</div>`;
    s+=`<div class="tsd"><div class="tsd-d" style="background:${c}"></div>depth <b>${n.depth}</b></div>`;
    $tss.innerHTML=s;
    $ntip.style.left=Math.min(e.clientX+14,innerWidth-320)+'px';
    $ntip.style.top=Math.min(e.clientY+14,innerHeight-140)+'px';
    $ntip.classList.add('v');
}
function hideTip(){$ntip.classList.remove('v')}

// ── Dynamic Shortcuts ──
function _sk(kbd,label){return`<div class="sk"><kbd>${kbd}</kbd><span>${label}</span></div>`}
function updateShortcuts(){
    if(!D){$sh.innerHTML='';return}
    let h='';const nd=sel?D.nodes.find(n=>n.id===sel):null;
    if(cv==='graph'){
        if(nd&&nd.type!=='ROOT') h+=_sk('Cmd+Click','Expand');
        h+=_sk('F','Fit');
    } else if(nd&&nd.type!=='ROOT'){
        h+=_sk('Dbl','Trace');
    }
    h+=_sk('/','Search');
    $sh.innerHTML=h;
}

// ── History ──
function updateHistoryState(cb,cf,p,t){
    $bbk.disabled=!cb;$bfw.disabled=!cf;
    if(t>1){$hbg.textContent=p+'/'+t;$hbg.classList.remove('h')}else $hbg.classList.add('h');
}
$bbk.addEventListener('click',()=>{if(window.jbCefQuery)window.jbCefQuery(JSON.stringify({type:'history_back'}))});
$bfw.addEventListener('click',()=>{if(window.jbCefQuery)window.jbCefQuery(JSON.stringify({type:'history_forward'}))});

// ── Node map for O(1) lookups ──
let nodeMap={};

// ── Node/Edge Builders (CallFlow-Visualizer style: box nodes, hierarchical LR) ──
function mkN(n,isDup){
    const c=gc(n.type,n.depth,n.isLibrary);
    const isRoot=n.type==='ROOT';
    // Solid dark backgrounds per type
    const bgs={ROOT:'#352840',OUTBOUND:'#1e2a3d',INBOUND:'#1e3028'};
    const bg=n.isLibrary?'#2a2a30':(bgs[n.type]||'#252636');
    const label=isRoot?(n.name||'anonymous'):(n.name||'anon');
    const fullLabel=isDup&&n.fileName?label+'\n_'+n.fileName+'_':label;
    return{id:n.id,label:fullLabel,shape:'box',
        color:{background:bg,border:c,highlight:{background:'#363750',border:c},hover:{background:'#2d2e44',border:c}},
        borderWidth:isRoot?3:1.5,borderWidthSelected:3,
        font:{color:n.isLibrary?'#8888a0':'#e0e0f0',size:isRoot?13:11,face:"'JetBrains Mono','SF Mono','Fira Code',monospace",bold:{color:c,size:isRoot?8:7,face:"'JetBrains Mono',monospace",mod:'bold'},ital:{color:'#7f849c',size:8,face:"'JetBrains Mono',monospace"},multi:'md'},
        margin:{top:isRoot?10:7,bottom:isRoot?10:7,left:isRoot?16:12,right:isRoot?16:12},
        shapeProperties:{borderRadius:isRoot?10:6},
        widthConstraint:{minimum:isRoot?120:80,maximum:220},
        shadow:{enabled:true,color:isRoot?'rgba(245,194,231,.12)':'rgba(0,0,0,.25)',size:isRoot?8:4,x:0,y:isRoot?3:2},
        opacity:n.isLibrary?.45:1,
        _data:n}
}

function mkE(e){
    const t=nodeMap[e.to];
    const f=nodeMap[e.from];
    const ii=t?.type==='INBOUND'||f?.type==='INBOUND';
    return{from:e.from,to:e.to,
        arrows:{to:{enabled:true,scaleFactor:.5,type:'arrow'}},
        color:{color:ii?'rgba(166,227,161,.4)':'rgba(137,180,250,.4)',highlight:'#f38ba8',hover:ii?'rgba(166,227,161,.75)':'rgba(137,180,250,.75)'},
        width:1.5,
        smooth:{enabled:true,type:'cubicBezier',forceDirection:'horizontal',roundness:.35},
        hoverWidth:.5}
}

// ── Shared Handlers ──
function onClk(p){
    if(p.nodes.length!==1){sel=null;updateShortcuts();return}
    const nid=p.nodes[0];sel=nid;updateShortcuts();
    if(p.event?.srcEvent?.metaKey||p.event?.srcEvent?.ctrlKey){
        const nd=D?.nodes?.find(n=>n.id===nid);
        if(nd?.type==='ROOT'){toast('Already viewing this function','var(--warn)');return}
        if(window.jbCefQuery)window.jbCefQuery(JSON.stringify({type:'expand',id:nid}));
    } else {
        if(window.jbCefQuery)window.jbCefQuery(JSON.stringify({type:'navigate',id:nid}));
    }
}
function onDbl(p){
    if(p.nodes.length!==1||!window.jbCefQuery)return;
    const nid=p.nodes[0];
    const nd=D?.nodes?.find(n=>n.id===nid);
    if(nd?.type==='ROOT'){toast('Already the root function','var(--warn)');return}
    toast('Tracing '+tr(nd?.name||nid,20)+'…','var(--accent)');
    window.jbCefQuery(JSON.stringify({type:'trace',id:nid}));
}
let _hovT=null;
function onHov(nt,ds){return p=>{
    if(drag)return;
    clearTimeout(_hovT);
    _hovT=setTimeout(()=>{
        const nd=ds.get(p.node);
        if(nd?._data){const pos=nt.canvasToDOM(nt.getPosition(p.node));const rc=nt.body.container.getBoundingClientRect();showTip({clientX:rc.left+pos.x,clientY:rc.top+pos.y},nd._data)}
        const c=new Set(nt.getConnectedNodes(p.node));c.add(p.node);
        ds.update(ds.getIds().map(id=>({id,opacity:c.has(id)?1:.12})));
    },200);
}}
function onBlr(ds){return()=>{clearTimeout(_hovT);hideTip();if(ds)ds.update(ds.getIds().map(id=>({id,opacity:undefined})))}}

// ── Draw Graph (hierarchical LR — callers LEFT, root CENTER, callees RIGHT) ──
function drawGraph(json){
    try{D=typeof json==='string'?JSON.parse(json):json}catch(e){return}
    if(!D||!Array.isArray(D.nodes)||!Array.isArray(D.edges))return;
    $es.classList.add('h');$ld.classList.remove('h');
    const root=D.nodes.find(n=>n.type==='ROOT');
    if(root){$bcn.textContent=root.name||'anonymous';sel=root.id;}
    _buildNet();
}

// Rebuild network from D with current showLib/sf filters — excludes library nodes at dataset level
function _buildNet(){
    if(!D)return;
    // Filter library nodes out of the dataset entirely (cleaner hierarchical layout, no phantom gaps)
    const visNodes=D.nodes.filter(n=>showLib||!n.isLibrary);
    const visIds=new Set(visNodes.map(n=>n.id));
    nodeMap={};for(const n of visNodes)nodeMap[n.id]=n;
    // Detect duplicate function names to show filename on ambiguous nodes
    const nc={};for(const n of visNodes)nc[n.name]=(nc[n.name]||0)+1;
    nds=new vis.DataSet(visNodes.map(n=>mkN(n,nc[n.name]>1)));
    eds=new vis.DataSet(D.edges.filter(e=>visIds.has(e.from)&&visIds.has(e.to)).map(mkE));
    // Apply search filter
    if(sf){const up=[];nds.forEach(n=>{if(!isVis(n._data))up.push({id:n.id,hidden:true})});if(up.length)nds.update(up)}
    if(net)net.destroy();
    net=new vis.Network($gc,{nodes:nds,edges:eds},{
        nodes:{},
        edges:{smooth:{enabled:true,type:'cubicBezier',forceDirection:'horizontal',roundness:.35}},
        physics:{enabled:false},
        interaction:{hover:true,tooltipDelay:99999,zoomView:true,dragView:true,navigationButtons:false,keyboard:{enabled:true}},
        layout:{hierarchical:{direction:'LR',sortMethod:'directed',levelSeparation:160,nodeSpacing:55,treeSpacing:100,parentCentralization:true,blockShifting:true,edgeMinimization:true,shakeTowards:'roots'}}
    });
    net.on('click',onClk);net.on('doubleClick',onDbl);
    net.on('hoverNode',onHov(net,nds));net.on('blurNode',onBlr(nds));
    net.on('dragStart',()=>{drag=true;hideTip()});net.on('dragEnd',()=>{drag=false});
    setTimeout(()=>{$ld.classList.add('h');if(net){net.fit({animation:{duration:300,easingFunction:'easeInOutQuad'}});setTimeout(updateZoomLabel,320)}},200);
    if(cv==='graph')$zc.classList.remove('h');
    uLeg();uSt();updateShortcuts();
    if(cv==='tree')rTree();
}

// Visibility test — only search filter (library handled at dataset level in _buildNet)
function isVis(d){if(!d||!sf)return true;const q=sf.toLowerCase();return(d.name||'').toLowerCase().includes(q)||(d.id||'').toLowerCase().includes(q)}

// Fast filter — toggles hidden flag for search only
function filt(){
    if(!nds)return;
    const up=[];nds.forEach(n=>{const v=isVis(n._data);if(!!n.hidden!==!v)up.push({id:n.id,hidden:!v})});
    if(up.length)nds.update(up);uSt();
}

// Unified filter
function filtAll(){filt();if(cv==='tree')rTree()}

// ── Tree ──
function rTree(){
    if(!D||!D.nodes||!D.edges)return;$tc.innerHTML='';
    const root=D.nodes.find(n=>n.type==='ROOT');if(!root)return;
    const nm={};for(const n of D.nodes)nm[n.id]=n;
    const cm={},pm={};
    for(const e of D.edges){(cm[e.from]=cm[e.from]||[]).push(e.to);(pm[e.to]=pm[e.to]||[]).push(e.from)}
    const hb=document.createElement('div');hb.className='thb';
    hb.innerHTML=`<div class="thb-d" style="background:var(--root)"></div><div class="thb-t">${esc(root.name||'anonymous')}</div><div class="thb-c">${D.nodes.length} nodes</div>`;
    $tc.appendChild(hb);
    $tc.appendChild(mkTR(root,0,false,false,false,[]));
    rSub($tc,root.id,nm,cm,pm,0,new Set([root.id]),[]);
}

function rSub(ct,nid,nm,cm,pm,dep,vis,cont){
    const pName=nm[nid]?.name||'anonymous';
    const cids=(cm[nid]||[]).filter(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary)&&mS(nm[id]));
    const pids=(pm[nid]||[]).filter(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary)&&mS(nm[id]));
    if(cids.length>0){
        ct.appendChild(mkSL(pName+' calls','var(--child)',cids.length,dep,cont));
        const g=document.createElement('div');g.className='tg';
        for(let ci=0;ci<cids.length;ci++){
            const cid=cids[ci];const n=nm[cid];if(!n)continue;
            const isLast=ci===cids.length-1&&pids.length===0;
            const cl=tColl.has(cid);
            const hc=(cm[cid]||[]).some(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary));
            const hp=(pm[cid]||[]).some(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary));
            const hk=hc||hp;
            const lastInGroup=ci===cids.length-1;
            g.appendChild(mkTR(n,dep+1,hk,cl,lastInGroup,cont));
            if(hk&&!cl){const nv=new Set(vis);nv.add(cid);rSub(g,cid,nm,cm,pm,dep+1,nv,[...cont,!lastInGroup])}
        }
        ct.appendChild(g);
    }
    if(pids.length>0){
        ct.appendChild(mkSL(pName+' called by','var(--parent)',pids.length,dep,cont));
        const g=document.createElement('div');g.className='tg';
        for(let pi=0;pi<pids.length;pi++){
            const pid=pids[pi];const n=nm[pid];if(!n)continue;
            const cl=tColl.has(pid);
            const hc=(cm[pid]||[]).some(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary));
            const hp=(pm[pid]||[]).some(id=>nm[id]&&!vis.has(id)&&(showLib||!nm[id]?.isLibrary));
            const hk=hc||hp;
            const lastInGroup=pi===pids.length-1;
            g.appendChild(mkTR(n,dep+1,hk,cl,lastInGroup,cont));
            if(hk&&!cl){const nv=new Set(vis);nv.add(pid);rSub(g,pid,nm,cm,pm,dep+1,nv,[...cont,!lastInGroup])}
        }
        ct.appendChild(g);
    }
}

function mkSL(t,c,cnt,dep,cont){
    const el=document.createElement('div');el.className='tsl';
    el.style.paddingLeft=(20+dep*14)+'px';
    let guides='';
    for(let i=0;i<dep;i++){if(cont[i])guides+=`<span class="tgi" style="left:${20+i*14}px"></span>`}
    el.innerHTML=guides+`<span class="tsl-d" style="background:${c}"></span>${t}<span class="tsl-c">${cnt}</span>`;
    return el;
}

function mkTR(n,dep,hk,cl,isLast,cont){
    const row=document.createElement('div');
    row.className='tr'+(n.type==='ROOT'?' rt':'')+(sel===n.id?' sel':'');
    const c=gc(n.type,n.depth,n.isLibrary);
    const cc=hk?(cl?'':'e'):'l';
    const bc=n.isLibrary?'bg-l':n.type==='ROOT'?'bg-r':n.type==='OUTBOUND'?'bg-o':'bg-i';
    const bl=n.isLibrary?'LIB':n.type==='ROOT'?'ROOT':n.type==='OUTBOUND'?'CHILD':'PARENT';
    let guides='';
    for(let i=0;i<dep-1;i++){if(cont[i])guides+=`<span class="tgi" style="left:${20+i*14}px"></span>`}
    if(dep>0){const lx=20+(dep-1)*14;guides+=`<span class="${isLast?'tgi-l':'tgi'}" style="left:${lx}px"></span><span class="tgh" style="left:${lx}px;width:10px"></span>`}
    row.innerHTML=`<div class="tri" style="width:${16+dep*14}px">${guides}</div><span class="trc ${cc}">&#9654;</span><div class="trb" style="background:${c}"></div><div class="trl" style="background:${c}">${(n.name||'F')[0].toUpperCase()}</div><span class="trn">${esc(n.name||'anon')}</span>${n.fileName?`<span class="trf">${esc(n.fileName)}</span>`:''}<div class="trr"><span class="trg ${bc}">${bl}</span>${n.loc>0?`<span class="trloc">${n.loc}L</span>`:''}</div>`;
    row.addEventListener('click',e=>{
        sel=n.id;updateShortcuts();document.querySelectorAll('.tr.sel').forEach(r=>r.classList.remove('sel'));row.classList.add('sel');
        if((e.metaKey||e.ctrlKey)&&window.jbCefQuery){
            if(n.type==='ROOT'){toast('Already viewing this function','var(--warn)');return}
            window.jbCefQuery(JSON.stringify({type:'expand',id:n.id}));
        } else if(window.jbCefQuery){
            window.jbCefQuery(JSON.stringify({type:'navigate',id:n.id}));
        }
    });
    row.addEventListener('dblclick',e=>{
        e.stopPropagation();
        if(n.type==='ROOT'){toast('Already the root function','var(--warn)');return}
        if(window.jbCefQuery){toast('Tracing '+tr(n.name||n.id,20)+'…','var(--accent)');window.jbCefQuery(JSON.stringify({type:'trace',id:n.id}))}
    });
    const ch=row.querySelector('.trc');
    if(hk){ch.style.cursor='pointer';ch.addEventListener('click',e=>{e.stopPropagation();tColl.has(n.id)?tColl.delete(n.id):tColl.add(n.id);rTree()})}
    row.addEventListener('mouseenter',e=>showTip(e,n));row.addEventListener('mouseleave',hideTip);
    return row;
}

function mS(n){if(!sf)return true;const q=sf.toLowerCase();return(n.name||'').toLowerCase().includes(q)||(n.id||'').toLowerCase().includes(q)}

// ── Legend & Stats ──
function uLeg(){
    if(!D||!D.nodes)return;$li.innerHTML='';
    const tc={ROOT:0,OUTBOUND:0,INBOUND:0};let lb=0;
    for(const n of D.nodes){if(!showLib&&n.isLibrary)continue;if(tc[n.type]!==undefined)tc[n.type]++;if(n.isLibrary)lb++}
    $li.innerHTML=`<div class="lr"><span class="lc" style="background:var(--root)"></span>Root<span class="ln">${tc.ROOT}</span></div><div class="lr"><span class="lc" style="background:var(--child)"></span>Children<span class="ln">${tc.OUTBOUND}</span></div><div class="lr"><span class="lc" style="background:var(--parent)"></span>Parents<span class="ln">${tc.INBOUND}</span></div>`+(lb?`<div class="lr"><span class="lc" style="background:var(--lib)"></span>Library<span class="ln">${lb}</span></div>`:'');
    $leg.classList.toggle('h',cv==='tree');
}
function uSt(){
    if(!D||!D.nodes||!D.edges)return;const tn=D.nodes.length,te=D.edges.length,md=Math.max(...D.nodes.map(n=>n.depth||0),0);
    let vn=tn;if(nds)vn=nds.get().filter(n=>!n.hidden).length;
    $sn.textContent=vn===tn?tn+' nodes':vn+'/'+tn+' nodes';
    $se.textContent=te+' edges';$sdp.textContent='Depth '+md;
    $sm.textContent=cv==='graph'?'Graph':'Tree';
}

// ── View Switch ──
function sw(v){
    cv=v;
    $bg.classList.toggle('on',v==='graph');$bt.classList.toggle('on',v==='tree');
    $gc.classList.toggle('off',v!=='graph');$tc.classList.toggle('on',v==='tree');
    $leg.classList.toggle('h',v==='tree');
    $zc.classList.toggle('h',v!=='graph');
    $bfit.style.display=v==='tree'?'none':'';
    if(v==='tree'&&D)rTree();
    if(v==='graph'&&net){setTimeout(()=>{net.redraw();updateZoomLabel()},30)}
    uLeg();uSt();updateShortcuts();
}

// ── Events ──
$bg.addEventListener('click',()=>sw('graph'));
$bt.addEventListener('click',()=>sw('tree'));

$tlib.addEventListener('click',function(){
    showLib=!showLib;this.classList.toggle('on',showLib);_buildNet();
    toast(showLib?'Library code visible':'Library code hidden',showLib?'var(--accent)':'var(--tx4)');
});
$bfit.addEventListener('click',()=>doFit());

// ── Zoom Controls ──
function doFit(){if(net)net.fit({animation:{duration:300,easingFunction:'easeInOutQuad'}})}
function updateZoomLabel(){if(!net)return;const s=net.getScale();$zlv.textContent=Math.round(s*100)+'%'}
function doZoom(dir){
    if(!net)return;
    const s=net.getScale();
    const ns=dir>0?s*1.3:s/1.3;
    net.moveTo({scale:Math.max(.05,Math.min(5,ns)),animation:{duration:200,easingFunction:'easeInOutQuad'}});
    setTimeout(updateZoomLabel,220);
}
$bzi.addEventListener('click',()=>doZoom(1));
$bzo.addEventListener('click',()=>doZoom(-1));
$bzf.addEventListener('click',()=>{doFit();setTimeout(updateZoomLabel,320)});
$bzc.addEventListener('click',()=>centerOnSel());

function centerOnSel(){
    if(!net||!sel)return;
    const pos=net.getPositions([sel])[sel];
    if(!pos)return;
    net.moveTo({position:pos,scale:net.getScale(),animation:{duration:300,easingFunction:'easeInOutQuad'}});
}

// ── Keyboard ──
document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'){if(e.key==='Escape'){sOpen=false;$sbn.classList.remove('op');sf='';$sin.value='';$sin.blur();filtAll()}return}

    // Search
    if(e.key==='/'||e.key==='f'){e.preventDefault();if(!sOpen){sOpen=true;$sbn.classList.add('op');setTimeout(()=>$sin.focus(),250)}else $sin.focus();return}

    // View switch
    if(e.key==='1'){sw('graph');return}
    if(e.key==='2'){sw('tree');return}

    // History (Alt+Arrow)
    if(e.altKey&&e.key==='ArrowLeft'){e.preventDefault();$bbk.click();return}
    if(e.altKey&&e.key==='ArrowRight'){e.preventDefault();$bfw.click();return}

    // Graph-only keys (no Alt/Cmd modifier)
    if(cv==='graph'&&!e.altKey&&!e.metaKey&&!e.ctrlKey){
        // Enter = open file for selected node
        if(e.key==='Enter'&&sel){
            e.preventDefault();
            if(window.jbCefQuery)window.jbCefQuery(JSON.stringify({type:'navigate',id:sel}));
            return;
        }
        // C = center on selected node
        if(e.key==='c'||e.key==='C'){centerOnSel();return}
        // F = fit all
        if(e.key==='F'||e.key==='f'){doFit();setTimeout(updateZoomLabel,320);return}
        // Zoom +/-
        if(e.key==='='||e.key==='+'){doZoom(1);return}
        if(e.key==='-'){doZoom(-1);return}
    }
});

// Track zoom level on scroll
$gc.addEventListener('wheel',()=>{setTimeout(updateZoomLabel,50)},{passive:true});
</script>
</body>
</html>
